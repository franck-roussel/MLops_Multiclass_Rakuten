name: CD - Build and Push API Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'rakuten_api/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connexion au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: ./rakuten_api
          push: true
          # L'image sera nommée : ghcr.io/votre-user/nom-du-repo/api_rakuten:latest
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/api_rakuten:latest
