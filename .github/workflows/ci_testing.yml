name: Python CI - Validation & Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configuration Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx
          if [ -f rakuten_api/requirements.txt ]; then pip install -r rakuten_api/requirements.txt; fi
      - name: Exécution des tests unitaires
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/rakuten_api
          pytest rakuten_api/tests/

  
# Force update
